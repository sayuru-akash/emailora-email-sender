<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
    <title id="title">Emailora</title>
    <desc id="desc">Cleaner email campaign operations for contacts, audiences, queues, and delivery reporting.</desc>
    <defs>
        <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#eef2ff"/>
            <stop offset="0.55" stop-color="#fafafa"/>
            <stop offset="1" stop-color="#ecfdf5"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4f46e5"/>
            <stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#18181b" flood-opacity="0.10"/>
        </filter>
    </defs>
    <rect width="1200" height="630" fill="url(#wash)"/>
    <circle cx="1010" cy="86" r="160" fill="#4f46e5" opacity="0.08"/>
    <circle cx="984" cy="540" r="220" fill="#10b981" opacity="0.08"/>
    <g transform="translate(104 96)">
        <rect width="64" height="64" rx="16" fill="url(#accent)"/>
        <path d="M20 23h24v18H20z" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
        <path d="m20 24 12 10 12-10" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
        <text x="84" y="43" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#18181b">Emailora</text>
        <text x="0" y="180" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="750" letter-spacing="-1" fill="#18181b">
            <tspan x="0">Cleaner email</tspan>
            <tspan x="0" dy="78">campaign ops.</tspan>
        </text>
        <text x="0" y="360" font-family="Inter, Arial, sans-serif" font-size="28" line-height="1.4" fill="#52525b">
            <tspan x="0">Import contacts, build audiences, send through queues,</tspan>
            <tspan x="0" dy="40">and verify delivery from one workspace.</tspan>
        </text>
        <rect x="0" y="430" width="210" height="54" rx="10" fill="#4f46e5"/>
        <text x="28" y="466" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#fff">codezela.com</text>
    </g>
    <g transform="translate(686 132)" filter="url(#shadow)">
        <rect width="400" height="354" rx="18" fill="#fff" stroke="#e4e4e7"/>
        <g transform="translate(30 28)">
            <text x="0" y="25" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#18181b">May CCB Reminder</text>
            <text x="0" y="53" font-family="Inter, Arial, sans-serif" font-size="15" fill="#71717a">129 recipients ready</text>
            <rect x="252" y="4" width="84" height="32" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
            <text x="272" y="25" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#047857">sent</text>
            <g transform="translate(0 88)">
                <rect width="104" height="76" rx="12" fill="#fafafa" stroke="#e4e4e7"/>
                <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="13" fill="#71717a">Sent</text>
                <text x="18" y="57" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="750" fill="#18181b">129</text>
                <rect x="118" width="104" height="76" rx="12" fill="#fafafa" stroke="#e4e4e7"/>
                <text x="136" y="28" font-family="Inter, Arial, sans-serif" font-size="13" fill="#71717a">Failed</text>
                <text x="136" y="57" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="750" fill="#18181b">0</text>
                <rect x="236" width="104" height="76" rx="12" fill="#fafafa" stroke="#e4e4e7"/>
                <text x="254" y="28" font-family="Inter, Arial, sans-serif" font-size="13" fill="#71717a">Queue</text>
                <text x="254" y="57" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="750" fill="#18181b">0</text>
            </g>
            <g transform="translate(0 196)">
                <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#18181b">Campaign progress</text>
                <text x="300" y="0" font-family="Inter, Arial, sans-serif" font-size="15" fill="#71717a">100%</text>
                <rect x="0" y="24" width="340" height="10" rx="5" fill="#e4e4e7"/>
                <rect x="0" y="24" width="340" height="10" rx="5" fill="#10b981"/>
            </g>
            <g transform="translate(0 270)">
                <rect width="160" height="44" rx="10" fill="#f4f4f5"/>
                <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#18181b">CCA unpaid</text>
                <text x="128" y="28" font-family="Inter, Arial, sans-serif" font-size="15" fill="#52525b">45</text>
                <rect x="180" width="160" height="44" rx="10" fill="#f4f4f5"/>
                <text x="198" y="28" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#18181b">CCB unpaid</text>
                <text x="306" y="28" font-family="Inter, Arial, sans-serif" font-size="15" fill="#52525b">129</text>
            </g>
        </g>
